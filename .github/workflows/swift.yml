name: Swift Client

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'swift/**'
      - '.github/workflows/swift.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'swift/**'
      - '.github/workflows/swift.yml'

jobs:
  test:
    runs-on: macos-latest
    strategy:
      matrix:
        xcode-version: ['15.0', '15.2']

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode-version }}.app

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          core/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install uniffi-bindgen
      run: cargo install --bin uniffi-bindgen --path core

    - name: Build Swift package
      working-directory: swift
      run: |
        cargo build --release --manifest-path ../core/Cargo.toml
        uniffi-bindgen generate ../core/src/mob.udl --language swift --out-dir Sources/Mob

    - name: Run Swift tests
      working-directory: swift
      run: swift test --filter MobTests
