name: Ruby Client

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'ruby/**'
      - '.github/workflows/ruby.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'ruby/**'
      - '.github/workflows/ruby.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.0', '3.1', '3.2', '3.3']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby ${{ matrix.ruby-version }}
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          core/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install uniffi-bindgen-rb
      run: cargo install uniffi-bindgen-rb --git https://github.com/hack3ric/uniffi-bindgen-rb

    - name: Build Ruby gem
      working-directory: ruby
      run: |
        cargo build --release --manifest-path ../core/Cargo.toml
        uniffi-bindgen-rb --library ../core/target/release/libmob.* --out-dir lib

    - name: Install Bundler
      run: gem install bundler

    - name: Install dependencies
      working-directory: ruby
      run: bundle install

    - name: Run tests
      working-directory: ruby
      run: bundle exec ruby tests/test_signer.rb
